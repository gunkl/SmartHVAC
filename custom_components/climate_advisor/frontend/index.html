<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Climate Advisor</title>
<style>
  :root {
    --bg: #f5f5f5;
    --card-bg: #ffffff;
    --text: #212121;
    --text-secondary: #757575;
    --border: #e0e0e0;
    --primary: #2196f3;
    --primary-light: #e3f2fd;
    --success: #4caf50;
    --warning: #ff9800;
    --danger: #f44336;
    --hot: #e53935;
    --warm: #fb8c00;
    --mild: #43a047;
    --cool: #1e88e5;
    --cold: #5c6bc0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a2e;
      --card-bg: #16213e;
      --text: #e0e0e0;
      --text-secondary: #9e9e9e;
      --border: #333;
      --primary-light: #1a237e;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    max-width: 960px;
    margin: 0 auto;
  }
  h1 { font-size: 1.4rem; margin-bottom: 16px; }
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
    border-bottom: 2px solid var(--border);
  }
  .tab-btn {
    padding: 10px 24px;
    border: none;
    background: none;
    color: var(--text-secondary);
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .card {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .card h2 {
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .status-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }
  .status-item {
    text-align: center;
    padding: 12px 8px;
    background: var(--bg);
    border-radius: 8px;
  }
  .status-item .label {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .status-item .value {
    font-size: 1.2rem;
    font-weight: 600;
  }
  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    color: #fff;
  }
  .badge.hot { background: var(--hot); }
  .badge.warm { background: var(--warm); }
  .badge.mild { background: var(--mild); }
  .badge.cool { background: var(--cool); }
  .badge.cold { background: var(--cold); }
  .badge.unknown { background: #9e9e9e; }
  .briefing-text {
    white-space: pre-wrap;
    font-size: 0.9rem;
    line-height: 1.6;
    max-height: 300px;
    overflow-y: auto;
    padding: 12px;
    background: var(--bg);
    border-radius: 8px;
  }
  .chart-container {
    position: relative;
    width: 100%;
    height: 300px;
  }
  .chart-container canvas {
    width: 100% !important;
    height: 100% !important;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 8px;
    font-size: 0.8rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-line {
    width: 24px;
    height: 3px;
    border-radius: 2px;
  }
  .legend-line.dashed {
    background: repeating-linear-gradient(
      90deg, currentColor 0, currentColor 4px, transparent 4px, transparent 8px
    );
    height: 2px;
  }
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    color: #fff;
    background: var(--primary);
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.secondary { background: #78909c; }
  .btn.success { background: var(--success); }
  .btn.warning { background: var(--warning); }
  .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .action-result {
    margin-top: 8px;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 0.85rem;
    display: none;
  }
  .action-result.show { display: block; }
  .action-result.ok { background: #e8f5e9; color: #2e7d32; }
  .action-result.err { background: #ffebee; color: #c62828; }
  @media (prefers-color-scheme: dark) {
    .action-result.ok { background: #1b5e20; color: #a5d6a7; }
    .action-result.err { background: #b71c1c; color: #ef9a9a; }
  }
  .debug-section { margin-bottom: 20px; }
  .debug-section h3 {
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .kv-table {
    width: 100%;
    font-size: 0.85rem;
    border-collapse: collapse;
  }
  .kv-table td {
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
  }
  .kv-table td:first-child {
    font-weight: 500;
    color: var(--text-secondary);
    width: 40%;
  }
  .suggestion-card {
    padding: 12px;
    background: var(--bg);
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .suggestion-card p { font-size: 0.85rem; margin-bottom: 8px; }
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-secondary);
  }
  .trend-arrow { font-size: 1rem; }
</style>
</head>
<body>

<h1>Climate Advisor</h1>

<div class="tabs">
  <button class="tab-btn active" data-tab="status">Status</button>
  <button class="tab-btn" data-tab="debug">Debug</button>
</div>

<div id="tab-status" class="tab-content active">
  <div class="card" id="status-card">
    <h2>Current Status</h2>
    <div id="status-loading" class="loading">Loading...</div>
    <div id="status-grid" class="status-grid" style="display:none"></div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h2 style="margin-bottom:0">Today's Strategy</h2>
      <button class="btn secondary" style="padding:5px 12px;font-size:0.75rem" onclick="doAction('send_briefing')">Regenerate</button>
    </div>
    <div id="briefing-loading" class="loading">Loading...</div>
    <div id="briefing-text" class="briefing-text" style="display:none"></div>
    <div id="briefing-action-result" class="action-result"></div>
  </div>

  <div class="card">
    <h2>Temperature Forecast</h2>
    <div class="chart-container">
      <canvas id="temp-chart"></canvas>
    </div>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-line dashed" style="color:#2196f3"></div>
        <span>Predicted Outdoor</span>
      </div>
      <div class="legend-item">
        <div class="legend-line dashed" style="color:#ff9800"></div>
        <span>Predicted Indoor</span>
      </div>
      <div class="legend-item">
        <div class="legend-line" style="background:#2196f3"></div>
        <span>Actual Outdoor</span>
      </div>
      <div class="legend-item">
        <div class="legend-line" style="background:#ff9800"></div>
        <span>Actual Indoor</span>
      </div>
    </div>
  </div>
</div>

<div id="tab-debug" class="tab-content">
  <div class="card">
    <h2>Actions</h2>
    <div class="btn-group">
      <button class="btn" onclick="doAction('force_reclassify')">Force Reclassify</button>
      <button class="btn secondary" onclick="doAction('send_briefing')">Send Briefing</button>
      <button class="btn warning" onclick="forceUpdate()">Force Update</button>
    </div>
    <div id="action-result" class="action-result"></div>
  </div>

  <div class="card">
    <h2>Learning Suggestions</h2>
    <div id="suggestions-container">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <div class="card">
    <h2>Automation State</h2>
    <div id="automation-state">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <div class="card">
    <h2>Today's Record</h2>
    <div id="today-record">
      <div class="loading">Loading...</div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // --- Tab switching ---
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'status') loadChart();
    });
  });

  // --- Auth: extract HA token from parent window ---
  function getAuthToken() {
    // Method 1: parent window's hass object (same-origin iframe)
    try {
      const ha = window.parent.document.querySelector('home-assistant');
      if (ha && ha.hass && ha.hass.auth && ha.hass.auth.data) {
        return ha.hass.auth.data.access_token;
      }
    } catch (e) { /* cross-origin or not ready */ }

    // Method 2: localStorage fallback (HA stores tokens here)
    try {
      const stored = localStorage.getItem('hassTokens');
      if (stored) {
        const tokens = JSON.parse(stored);
        if (tokens && tokens.access_token) return tokens.access_token;
      }
    } catch (e) { /* unavailable */ }

    return null;
  }

  // --- API helpers ---
  async function apiFetch(path, opts = {}) {
    const token = getAuthToken();
    const headers = { ...(opts.headers || {}) };
    if (token) {
      headers['Authorization'] = 'Bearer ' + token;
    }
    const resp = await fetch('/api/climate_advisor/' + path, {
      credentials: 'same-origin',
      ...opts,
      headers,
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return resp.json();
  }

  async function apiPost(path) {
    return apiFetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
    });
  }

  // --- Status tab ---
  async function loadStatus() {
    try {
      const data = await apiFetch('status');
      const grid = document.getElementById('status-grid');
      const dayType = data.day_type || 'unknown';
      const trendArrow = data.trend_direction === 'warming' ? '\u2191'
        : data.trend_direction === 'cooling' ? '\u2193' : '\u2192';
      const score = Math.round((data.compliance_score || 0) * 100);

      grid.innerHTML = `
        <div class="status-item">
          <div class="label">Day Type</div>
          <div class="value"><span class="badge ${dayType}">${dayType}</span></div>
        </div>
        <div class="status-item">
          <div class="label">Trend</div>
          <div class="value"><span class="trend-arrow">${trendArrow}</span> ${(data.trend_magnitude || 0).toFixed(1)}\u00b0F</div>
        </div>
        <div class="status-item">
          <div class="label">HVAC Mode</div>
          <div class="value">${data.hvac_mode || 'unknown'}</div>
        </div>
        <div class="status-item">
          <div class="label">Status</div>
          <div class="value">${data.automation_status || 'unknown'}</div>
        </div>
        <div class="status-item">
          <div class="label">Compliance</div>
          <div class="value">${score}%</div>
        </div>
        <div class="status-item">
          <div class="label">Next Action</div>
          <div class="value" style="font-size:0.85rem">${data.next_action || 'None'}</div>
        </div>
      `;
      document.getElementById('status-loading').style.display = 'none';
      grid.style.display = 'grid';
    } catch (e) {
      document.getElementById('status-loading').textContent = 'Failed to load status: ' + e.message;
    }
  }

  async function loadBriefing() {
    try {
      const data = await apiFetch('briefing');
      const el = document.getElementById('briefing-text');
      el.textContent = data.briefing || 'No briefing generated yet today.';
      document.getElementById('briefing-loading').style.display = 'none';
      el.style.display = 'block';
    } catch (e) {
      document.getElementById('briefing-loading').textContent = 'Failed to load briefing: ' + e.message;
    }
  }

  // --- Chart ---
  function drawChart(chartData) {
    const canvas = document.getElementById('temp-chart');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = rect.height;

    const pad = { top: 20, right: 20, bottom: 30, left: 45 };
    const plotW = W - pad.left - pad.right;
    const plotH = H - pad.top - pad.bottom;

    // Find temp range across all series
    let allTemps = [];
    (chartData.predicted_outdoor || []).forEach(p => allTemps.push(p.temp));
    (chartData.predicted_indoor || []).forEach(p => allTemps.push(p.temp));
    (chartData.actual_outdoor || []).forEach(p => allTemps.push(p.temp));
    (chartData.actual_indoor || []).forEach(p => allTemps.push(p.temp));

    if (allTemps.length === 0) {
      ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('color');
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('No data available yet', W / 2, H / 2);
      return;
    }

    let minT = Math.floor(Math.min(...allTemps) - 3);
    let maxT = Math.ceil(Math.max(...allTemps) + 3);

    function xPos(hour) { return pad.left + (hour / 24) * plotW; }
    function yPos(temp) { return pad.top + plotH - ((temp - minT) / (maxT - minT)) * plotH; }

    // Clear
    ctx.clearRect(0, 0, W, H);

    // Grid and axes
    const textColor = getComputedStyle(document.body).getPropertyValue('color') || '#212121';
    ctx.strokeStyle = 'rgba(128,128,128,0.2)';
    ctx.lineWidth = 1;
    ctx.font = '11px sans-serif';
    ctx.fillStyle = textColor;

    // Y-axis gridlines and labels
    const tempStep = Math.max(1, Math.round((maxT - minT) / 6));
    for (let t = minT; t <= maxT; t += tempStep) {
      const y = yPos(t);
      ctx.beginPath();
      ctx.moveTo(pad.left, y);
      ctx.lineTo(W - pad.right, y);
      ctx.stroke();
      ctx.textAlign = 'right';
      ctx.fillText(t + '\u00b0', pad.left - 6, y + 4);
    }

    // X-axis hour labels
    ctx.textAlign = 'center';
    for (let h = 0; h <= 24; h += 3) {
      const x = xPos(h);
      const label = h === 0 || h === 24 ? '12a' : h === 12 ? '12p'
        : h < 12 ? h + 'a' : (h - 12) + 'p';
      ctx.fillText(label, x, H - pad.bottom + 18);
      ctx.beginPath();
      ctx.moveTo(x, pad.top);
      ctx.lineTo(x, H - pad.bottom);
      ctx.stroke();
    }

    // Draw a series as polyline
    function drawSeries(points, color, dashed) {
      if (!points || points.length === 0) return;
      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.setLineDash(dashed ? [6, 4] : []);
      points.forEach((p, i) => {
        const x = xPos(p.hour !== undefined ? p.hour : parseHour(p.time));
        const y = yPos(p.temp);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function parseHour(isoStr) {
      const d = new Date(isoStr);
      return d.getHours() + d.getMinutes() / 60;
    }

    // Draw series
    drawSeries(chartData.predicted_outdoor, '#2196f3', true);
    drawSeries(chartData.predicted_indoor, '#ff9800', true);
    drawSeries(chartData.actual_outdoor, '#2196f3', false);
    drawSeries(chartData.actual_indoor, '#ff9800', false);

    // "Now" marker
    if (chartData.current_hour != null) {
      const nx = xPos(chartData.current_hour);
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(128,128,128,0.6)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.moveTo(nx, pad.top);
      ctx.lineTo(nx, H - pad.bottom);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = textColor;
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Now', nx, pad.top - 6);
    }
  }

  async function loadChart() {
    try {
      const data = await apiFetch('chart_data');
      drawChart(data);
    } catch (e) {
      console.error('Chart load failed:', e);
    }
  }

  // --- Debug tab ---
  window.doAction = async function(action) {
    const el = document.getElementById('action-result');
    el.className = 'action-result';
    el.style.display = 'none';
    try {
      const data = await apiPost(action);
      el.textContent = data.message || 'Done';
      el.className = 'action-result show ok';
      el.style.display = '';
      // Refresh status after action
      setTimeout(() => { loadStatus(); loadBriefing(); loadChart(); }, 1000);
    } catch (e) {
      el.textContent = 'Error: ' + e.message;
      el.className = 'action-result show err';
      el.style.display = '';
    }
  };

  window.forceUpdate = async function() {
    await window.doAction('force_reclassify');
  };

  window.respondSuggestion = async function(key, action) {
    try {
      await apiFetch('respond_suggestion', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: action, suggestion_key: key }),
      });
      loadLearning();
    } catch (e) {
      console.error('Suggestion response failed:', e);
    }
  };

  async function loadAutomationState() {
    try {
      const data = await apiFetch('automation_state');
      const el = document.getElementById('automation-state');

      let sensorRows = '';
      const sensors = data.door_window_sensors || {};
      for (const [id, info] of Object.entries(sensors)) {
        sensorRows += `<tr><td>${info.friendly_name}</td><td>${info.open ? 'Open' : 'Closed'}</td></tr>`;
      }

      el.innerHTML = `
        <div class="debug-section">
          <table class="kv-table">
            <tr><td>Paused by Door/Window</td><td>${data.paused_by_door ? 'Yes' : 'No'}</td></tr>
            <tr><td>Pre-Pause Mode</td><td>${data.pre_pause_mode || 'N/A'}</td></tr>
            <tr><td>Grace Period Active</td><td>${data.grace_active ? 'Yes' : 'No'}</td></tr>
            <tr><td>Last Resume Source</td><td>${data.last_resume_source || 'N/A'}</td></tr>
            <tr><td>Pending Debounce Timers</td><td>${(data.pending_debounce_timers || []).length}</td></tr>
          </table>
        </div>
        ${sensorRows ? `
          <div class="debug-section">
            <h3>Door/Window Sensors</h3>
            <table class="kv-table">${sensorRows}</table>
          </div>
        ` : ''}
        ${data.classification ? `
          <div class="debug-section">
            <h3>Classification Details</h3>
            <table class="kv-table">
              <tr><td>Day Type</td><td>${data.classification.day_type || 'N/A'}</td></tr>
              <tr><td>HVAC Mode</td><td>${data.classification.hvac_mode || 'N/A'}</td></tr>
              <tr><td>Trend</td><td>${data.classification.trend_direction || 'N/A'} (${(data.classification.trend_magnitude || 0).toFixed(1)}\u00b0F)</td></tr>
              <tr><td>Windows Recommended</td><td>${data.classification.windows_recommended ? 'Yes' : 'No'}</td></tr>
              <tr><td>Window Open Time</td><td>${data.classification.window_open_time || 'N/A'}</td></tr>
              <tr><td>Window Close Time</td><td>${data.classification.window_close_time || 'N/A'}</td></tr>
              <tr><td>Pre-Condition</td><td>${data.classification.pre_condition ? 'Yes (' + data.classification.pre_condition_target + '\u00b0F)' : 'No'}</td></tr>
              <tr><td>Setback Modifier</td><td>${data.classification.setback_modifier || 0}\u00b0F</td></tr>
            </table>
          </div>
        ` : ''}
      `;
    } catch (e) {
      document.getElementById('automation-state').innerHTML =
        '<p style="color:var(--danger)">Failed to load: ' + e.message + '</p>';
    }
  }

  async function loadLearning() {
    try {
      const data = await apiFetch('learning');
      const sugEl = document.getElementById('suggestions-container');
      const recEl = document.getElementById('today-record');

      // Suggestions
      const suggestions = data.suggestions || [];
      if (suggestions.length === 0) {
        sugEl.innerHTML = '<p style="color:var(--text-secondary);font-size:0.85rem">No pending suggestions.</p>';
      } else {
        // Generate simple keys from suggestion text
        sugEl.innerHTML = suggestions.map((s, i) => {
          const key = s.substring(0, 30).replace(/[^a-z0-9]/gi, '_').toLowerCase();
          return `
            <div class="suggestion-card">
              <p>${s}</p>
              <div class="btn-group">
                <button class="btn success" style="padding:6px 14px;font-size:0.8rem"
                  onclick="respondSuggestion('${key}','accept')">Accept</button>
                <button class="btn secondary" style="padding:6px 14px;font-size:0.8rem"
                  onclick="respondSuggestion('${key}','dismiss')">Dismiss</button>
              </div>
            </div>
          `;
        }).join('');
      }

      // Today's record
      const rec = data.today_record;
      if (!rec) {
        recEl.innerHTML = '<p style="color:var(--text-secondary);font-size:0.85rem">No record yet today (created at briefing time).</p>';
      } else {
        recEl.innerHTML = `
          <table class="kv-table">
            <tr><td>Date</td><td>${rec.date}</td></tr>
            <tr><td>Day Type</td><td>${rec.day_type}</td></tr>
            <tr><td>Trend</td><td>${rec.trend_direction}</td></tr>
            <tr><td>Windows Recommended</td><td>${rec.windows_recommended ? 'Yes' : 'No'}</td></tr>
            <tr><td>Windows Opened</td><td>${rec.windows_opened ? 'Yes' : 'No'}</td></tr>
            <tr><td>HVAC Runtime</td><td>${rec.hvac_runtime_minutes.toFixed(0)} min</td></tr>
            <tr><td>Manual Overrides</td><td>${rec.manual_overrides}</td></tr>
            <tr><td>Door/Window Pauses</td><td>${rec.door_window_pause_events}</td></tr>
            <tr><td>Comfort Violations</td><td>${rec.comfort_violations_minutes.toFixed(0)} min</td></tr>
          </table>
        `;
      }

      // Compliance summary
      const comp = data.compliance || {};
      if (comp.status === 'active') {
        recEl.innerHTML += `
          <div class="debug-section" style="margin-top:12px">
            <h3>Compliance Summary</h3>
            <table class="kv-table">
              <tr><td>Days Recorded</td><td>${comp.days_recorded}</td></tr>
              <tr><td>Window Compliance</td><td>${comp.window_compliance != null ? (comp.window_compliance * 100).toFixed(0) + '%' : 'N/A'}</td></tr>
              <tr><td>Avg HVAC Runtime</td><td>${(comp.avg_daily_hvac_runtime_minutes || 0).toFixed(0)} min/day</td></tr>
              <tr><td>Comfort Score</td><td>${((comp.comfort_score || 0) * 100).toFixed(0)}%</td></tr>
              <tr><td>Total Manual Overrides</td><td>${comp.total_manual_overrides || 0}</td></tr>
            </table>
          </div>
        `;
      }
    } catch (e) {
      document.getElementById('suggestions-container').innerHTML =
        '<p style="color:var(--danger)">Failed to load: ' + e.message + '</p>';
      document.getElementById('today-record').innerHTML = '';
    }
  }

  // --- Initial load (retry until auth token is available) ---
  function loadAll() {
    loadStatus();
    loadBriefing();
    loadChart();
    loadAutomationState();
    loadLearning();
  }

  let _loadRetries = 0;
  function initLoad() {
    if (getAuthToken()) {
      loadAll();
    } else if (_loadRetries < 20) {
      _loadRetries++;
      setTimeout(initLoad, 250);
    } else {
      // Give up waiting — try anyway (will show error messages in UI)
      loadAll();
    }
  }
  initLoad();

  // --- Auto-refresh ---
  setInterval(() => { loadStatus(); loadBriefing(); }, 60000);
  setInterval(loadChart, 300000);
  setInterval(() => { loadAutomationState(); loadLearning(); }, 60000);

  // Redraw chart on resize
  window.addEventListener('resize', loadChart);
})();
</script>
</body>
</html>
